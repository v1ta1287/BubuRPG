<!DOCTYPE html>
<html>

<head>
    <script src="phaser.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #bbafb5;
            /* Dark grey so you can see the game bounds */
        }

        #game-container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        canvas {
            /* This ensures the canvas itself doesn't have 
           any weird inline spacing issues */
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
